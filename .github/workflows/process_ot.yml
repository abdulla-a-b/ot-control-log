name: ⏱ Process OT Data & Deploy Dashboard

on:
  push:
    branches: [main]
    paths: ['data/**', 'scripts/process_ot.py']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  process:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.11'}
      - run: pip install pandas openpyxl
      - name: Process OT data
        run: python scripts/process_ot.py
      - name: Commit JSON
        run: |
          git config user.email "actions@github.com"
          git config user.name  "GitHub Actions"
          git add docs/data/ot_data.json
          git diff --staged --quiet || git commit -m "🤖 OT data update [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
